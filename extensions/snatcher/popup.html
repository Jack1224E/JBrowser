<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            overflow: hidden;
            user-select: none;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #2d2d2d;
        }

        .logo {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #0dcaf0, #0d6efd);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-weight: 800;
            color: #ffffff;
            font-size: 14px;
            letter-spacing: -1px;
            box-shadow: 0 2px 4px rgba(13, 202, 240, 0.2);
        }

        .title {
            font-size: 18px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 0.3px;
        }

        .menu-section {
            padding: 8px 0;
            border-bottom: 1px solid #2d2d2d;
        }

        .menu-section:last-child {
            border-bottom: none;
            background-color: #161616;
        }

        .menu-item {
            padding: 10px 20px;
            font-size: 14px;
            color: #c4c4c4;
            cursor: pointer;
            transition: background-color 0.15s ease, color 0.15s ease;
            display: flex;
            align-items: center;
        }

        .menu-item:hover {
            background-color: #2a2a2a;
            color: #ffffff;
        }

        .menu-item.active {
            color: #0dcaf0;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">PIR</div>
        <div class="title">Pir Downloader</div>
    </div>

    <div class="menu-section">
        <div class="menu-item" id="pauseAll">Pause to catch downloads from all sites</div>
        <div class="menu-item" id="pauseSite">Don't catch downloads from this site</div>
    </div>

    <div class="menu-section">
        <div class="menu-item" id="options">Options</div>
        <div class="menu-item" id="help">Help and Feedback</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
